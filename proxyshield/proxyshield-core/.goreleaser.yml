version: 2

# Releases are published to github.com/tejaspatil1936/Consensus-Lab (see the
# `release` block). Tag releases with valid SemVer, e.g. `v2.0.0` — NOT `v2.0.00`,
# which GoReleaser passed through as the odd "2.0.00" in earlier artifacts.

project_name: proxyshield

before:
  hooks:
    - go mod tidy

builds:
  - id: proxyshield
    main: ./cmd/proxyshield/
    binary: proxyshield
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - id: default
    formats:
      - tar.gz
      - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - README*
      - config.json
      - honeypots.json

checksum:
  name_template: "checksums.txt"

# Untagged / dirty builds get a clearly-marked snapshot version instead of an
# accidental release-looking string.
snapshot:
  version_template: "{{ incpatch .Version }}-dev+{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: tejaspatil1936
    name: Consensus-Lab
  draft: false
  prerelease: auto
  name_template: "ProxyShield v{{ .Version }}"
